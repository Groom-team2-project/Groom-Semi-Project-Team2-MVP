spring:
    config:
        import: optional:file:.env[.properties]

    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:buying_mvp}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_PASSWORD:${MYSQL_ROOT_PASSWORD:password}}

kakao:
    oauth:
        client-id: ${KAKAO_CLIENT_ID:}
        client-secret: ${KAKAO_CLIENT_SECRET:}
        redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/v1/auth/kakao/callback}

redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

app:
    jwt:
        secret: ${JWT_SECRET:local-dev-jwt-secret-key-change-before-deploy}
    oauth:
        cookie-secure: ${OAUTH_COOKIE_SECURE:false}
