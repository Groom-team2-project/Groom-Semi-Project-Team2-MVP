spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TEST_DATASOURCE_URL:jdbc:mysql://localhost:3306/buying_mvp_test?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${TEST_DATASOURCE_USERNAME:root}
    password: ${TEST_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:password}}

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
