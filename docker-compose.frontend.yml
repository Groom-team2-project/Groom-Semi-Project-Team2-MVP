services:
  frontend:
    build:
      context: ./frontend
    container_name: groom-mvp-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://host.docker.internal:8080}
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    networks:
      - groom-mvp-network

volumes:
  frontend-node-modules:
